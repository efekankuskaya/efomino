<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Affettirme Operasyonu 💖</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Arial", sans-serif;
}

body{
    background:white;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Arka plan glow */
.bg-glow{
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255, 105, 180, 0.12);
    filter:blur(120px);
    border-radius:50%;
    z-index:0;
    animation:pulse 5s infinite ease-in-out;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.2);
    }
}

/* Kalpler */
.heart{
    position:absolute;
    bottom:-20px;
    color:#ff7aa8;
    animation:floatUp linear forwards;
    opacity:0.7;
    z-index:1;
    user-select:none;
}

@keyframes floatUp{

    0%{
        transform:
            translateY(0)
            translateX(0)
            rotate(0deg);
        opacity:0;
    }

    20%{
        opacity:0.8;
    }

    50%{
        transform:
            translateY(-50vh)
            translateX(20px)
            rotate(15deg);
    }

    100%{
        transform:
            translateY(-110vh)
            translateX(-30px)
            rotate(-15deg);
        opacity:0;
    }
}

/* Ana kutu */
.container{
    width:90%;
    max-width:400px;
    padding:30px 20px;
    border-radius:30px;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(10px);
    box-shadow:0 10px 35px rgba(255,105,180,0.15);
    text-align:center;
    z-index:10;
    animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    color:#ff4f8b;
    font-size:28px;
    line-height:1.4;
    margin-bottom:20px;
}

.gif{
    width:220px;
    max-width:100%;
    margin-bottom:25px;
}

/* Butonlar */
.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    position:relative;
    min-height:60px;
}

button{
    border:none;
    border-radius:16px;
    padding:14px 24px;
    font-size:18px;
    cursor:pointer;
    transition:0.25s;
}

#yesBtn{
    background:#ff5f98;
    color:white;
    box-shadow:0 6px 15px rgba(255,95,152,0.4);
}

#yesBtn:hover{
    transform:scale(1.08);
}

#noBtn{
    background:#ececec;
    color:#444;
    position:relative;
}

/* Final ekranı */

#finalScreen{
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:90%;
    max-width:420px;
    padding:30px;
    border-radius:30px;
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(10px);
    box-shadow:0 10px 35px rgba(255,105,180,0.15);
    text-align:center;
    z-index:10;
    animation:fadeIn 1s ease;
}

#finalScreen h1{
    margin-bottom:20px;
}

.final-gif{
    width:260px;
    max-width:100%;
}

/* Mobil */
@media(max-width:480px){

    h1{
        font-size:24px;
    }

    button{
        font-size:16px;
        padding:12px 20px;
    }

}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container" id="mainScreen">

    <h1>
        seni affettirecek hünerlerimi gösteriyim mi 😉
    </h1>

    <img src="typing.gif" class="gif">

    <div class="buttons">

        <button id="yesBtn">
            Evet
        </button>

        <button id="noBtn">
            Hayır
        </button>

    </div>

</div>

<div id="finalScreen">

    <h1>
        özür dilerim prensesim 💖<br>
        bu çiçekler sana 🌸
    </h1>

    <img src="flower.gif" class="final-gif">

</div>

<script>

/* Romantik kalpler */

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = Math.random() > 0.5 ? "❤" : "💖";

    heart.style.left = Math.random() * window.innerWidth + "px";

    heart.style.fontSize = (Math.random() * 18 + 12) + "px";

    heart.style.animationDuration = (Math.random() * 4 + 4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 8000);
}

setInterval(createHeart, 180);

/* Hayır butonu kaçsın */

const noBtn = document.getElementById("noBtn");

function moveButton(){

    const maxX = window.innerWidth - 120;
    const maxY = window.innerHeight - 70;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.position = "fixed";

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";

    noBtn.style.transform =
        `rotate(${Math.random()*30-15}deg)`;
}

/* Sadece tıklayınca kaçacak */

noBtn.addEventListener("click", (e) => {

    e.preventDefault();

    moveButton();
});

/* Mobil dokunma için */

noBtn.addEventListener("touchstart", (e) => {

    e.preventDefault();

    moveButton();
});

/* Evet ekranı */

document.getElementById("yesBtn")
.addEventListener("click", () => {

    document.getElementById("mainScreen")
    .style.display = "none";

    document.getElementById("finalScreen")
    .style.display = "flex";
});

</script>

</body>
</html>
